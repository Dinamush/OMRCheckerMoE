<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}OMRChecker Web UI{% endblock %}</title>
    <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
    <header class="topbar">
        <div class="wrap">
            <a class="brand" href="/">OMRChecker</a>
            <nav class="links">
                <a href="/">Batches</a>
                <a href="/docs" target="_blank" rel="noopener">API docs</a>
            </nav>
        </div>
    </header>
    <main class="wrap main">
        {% block content %}{% endblock %}
    </main>
    <footer class="footer">
        <div class="wrap">
            <span>OMRChecker Web UI &middot; Local-first</span>
        </div>
    </footer>
    {% block scripts %}{% endblock %}
</body>
</html>
