<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" aria-hidden="true">
  <defs>
    <linearGradient id="cornGrad" x1="25%" y1="0%" x2="75%" y2="100%">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="45%" stop-color="#eab308"/>
      <stop offset="100%" stop-color="#ca8a04"/>
    </linearGradient>
    <linearGradient id="huskGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
  </defs>

  <!-- Tile -->
  <rect width="32" height="32" rx="8" fill="#1e40af"/>

  <!-- Husks (behind cob, wrap lower half) -->
  <path
    d="M3.5 26.5 C3.5 15 6.5 10.5 11.5 9.5 L10.5 26.5 Z"
    fill="url(#huskGrad)"
    opacity="0.95"/>
  <path
    d="M28.5 26.5 C28.5 15 25.5 10.5 20.5 9.5 L21.5 26.5 Z"
    fill="#15803d"
    opacity="0.92"/>

  <!-- Tapered cob: wide mid-ear, narrow tip and base -->
  <path
    d="M 13.5 5.2
       C 14.8 4.6 16.2 4.6 17.5 5.2
       C 18.8 10 18.9 15 17.6 23.8
       C 16.9 26.2 14.1 26.2 13.4 23.8
       C 12.1 15 12.2 10 13.5 5.2 Z"
    fill="url(#cornGrad)"/>
  <path
    d="M 13.5 5.2 C 14.8 4.6 16.2 4.6 17.5 5.2 C 18.8 10 18.9 15 17.6 23.8 C 16.9 26.2 14.1 26.2 13.4 23.8 C 12.1 15 12.2 10 13.5 5.2 Z"
    fill="none"
    stroke="#a16207"
    stroke-width="0.4"
    opacity="0.5"/>

  <!-- Silk / tip -->
  <path
    d="M13.8 5 Q15 2.8 16.2 5"
    fill="none"
    stroke="#fef9c3"
    stroke-width="0.95"
    stroke-linecap="round"/>

  <!-- Kernel bands (staggered) -->
  <g fill="#854d0e" opacity="0.58">
    <circle cx="14.2" cy="9.8" r="1.1"/><circle cx="16.2" cy="9.8" r="1.1"/>
    <circle cx="13.4" cy="13.2" r="1.1"/><circle cx="15.2" cy="13.2" r="1.1"/><circle cx="17.1" cy="13.2" r="1.1"/>
    <circle cx="14.2" cy="16.6" r="1.1"/><circle cx="16.2" cy="16.6" r="1.1"/>
    <circle cx="13.4" cy="20" r="1.1"/><circle cx="15.2" cy="20" r="1.1"/><circle cx="17.1" cy="20" r="1.1"/>
    <circle cx="14.2" cy="23.2" r="1.1"/><circle cx="16.2" cy="23.2" r="1.1"/>
  </g>

  <!-- Save / floppy (~11×10), bottom-right, separated from cob -->
  <g transform="translate(18.75 17)">
    <rect x="-0.4" y="-0.4" width="12.3" height="10.7" rx="1.15" fill="#0f172a" opacity="0.4"/>
    <rect x="0" y="0" width="11.5" height="9.9" rx="1.05" fill="#e2e8f0"/>
    <rect x="0" y="0" width="11.5" height="3.55" rx="1.05" fill="#94a3b8"/>
    <rect x="0.65" y="0.65" width="4.6" height="2.25" rx="0.4" fill="#64748b"/>
    <rect x="1.85" y="3.85" width="7.8" height="1" rx="0.2" fill="#475569"/>
    <rect x="2.15" y="5.45" width="7.2" height="4.1" rx="0.55" fill="#2563eb"/>
    <circle cx="5.75" cy="7.45" r="1.1" fill="#dbeafe"/>
  </g>
</svg>
