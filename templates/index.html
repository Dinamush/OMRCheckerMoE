<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Video Downloader</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Video Downloader</h1>
        <form action="/download" method="post" id="downloadForm">
            <div class="form-group">
                <label for="base_url">Base URL:</label>
                <input type="url" id="base_url" name="base_url" placeholder="https://xhamster.com" required>
            </div>

            <div class="form-group">
                <label for="favorites_url">Favorites URL:</label>
                <input type="url" id="favorites_url" name="favorites_url" placeholder="https://xhamster.com/my/favorites/videos" required>
            </div>

            <div class="form-group checkbox-group">
                <input type="checkbox" id="headless" name="headless">
                <label for="headless">Run Headlessly</label>
            </div>

            <button type="submit">Start Download</button>
        </form>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
